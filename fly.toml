# fly.toml — InstaRead
# Deploy with:
#   1. flyctl launch --no-deploy       (first-time; accept when it detects Dockerfile)
#   2. flyctl secrets set MONGO_URL="..." DB_NAME="instaread" CORS_ORIGINS="*"
#   3. flyctl deploy

app = "instaread"
primary_region = "iad"   # change to your closest region (e.g. lhr, sin, fra, syd)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
